# FIXME EGL_BAD_PARAMETER
# (test-rqbit) fhs-fhsenv:user@laptop:~/src/conda-forge-staged-recipes$ rqbit-desktop 
# 2026-06-24T04:41:04.225609Z  INFO rqbit_desktop: increased open file limit limit=524288
# Fontconfig warning: using without calling FcInit()
# Could not create default EGL display: EGL_BAD_PARAMETER. Aborting...

# based on
# https://github.com/ikatson/rqbit/blob/main/.github/workflows/release-linux.yml

context:
  # 2026-01-20
  version: "9.0.0-beta.2"
  sha256: "45a2d4b5ffe8dfd0231d7417fff8b77d604e8412a858b6ee8b53cef25bdbcf9b"
  enable_desktop: "false"
  # fix: error: failed to run custom build command for `openssl-sys v0.9.111`
  # This crate is only compatible with OpenSSL (version 1.0.2 through 1.1.1, or 3), or LibreSSL 3.5  through 4.2.x,
  # but a different version of OpenSSL was found.
  # openssl_version: "3.*"
  openssl_version: ">=4.2|<4"
  # openssl_version: ">=4.2|3.*"

package:
  name: rqbit-desktop
  # fix: invalid value for `version`: `version cannot contain `-``.
  version: ${{ version | replace("-", "_") }}

source:
  url: https://github.com/ikatson/rqbit/archive/refs/tags/v${{ version }}.tar.gz
  sha256: ${{ sha256 }}

build:
  number: 0
  script:
    # env:
    #   CARGO_PROFILE_RELEASE_STRIP: symbols
    #   CARGO_PROFILE_RELEASE_LTO: fat

    content:

      # fix: stdout and stderr of build script are not correctly interleaved
      # https://github.com/prefix-dev/rattler-build/issues/2511
      # - {"if":"win","then":"","else":"exec 2>&1"}
      - {"if":"unix","then":"exec 2>&1"}

      # trace commands
      - {"if":"win","then":"echo on","else":"set -x"}

      - if: unix
        then:
          - export RUST_BACKTRACE=1
        else:
          - set RUST_BACKTRACE=1

      # fix: failed to run rustc: $BUILD_PREFIX/bin/rustc: error while loading shared libraries: libz.so.1: cannot open shared object file: No such file or directory
      # https://github.com/conda-forge/rust-feedstock/issues/290
      - if: unix
        then:
          - export LD_LIBRARY_PATH="$BUILD_PREFIX/lib:$LD_LIBRARY_PATH"
        else:
          - set LD_LIBRARY_PATH="$BUILD_PREFIX/lib:$LD_LIBRARY_PATH"

      # - env | grep CARGO; exit 1 # debug

      # check libraries for rqbit-desktop -> fail early
      # fix: The system library `gdk-3.0` required by crate `gdk-sys` was not found.
      - pkg-config --libs --cflags gdk-3.0

      - npm ci

      # create crates/librqbit/webui/dist
      - pushd crates/librqbit/webui
      - npm run build
      - popd

      # This script fascilitates the build of the webui,
      #  we've already built that
      - rm crates/librqbit/build.rs

      #- if: unix
      #  then:
      #    - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path crates/rqbit
      #  else:
      #    - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path crates/rqbit

      # FIXME failed to parse as jinja expression
      # - if: ${{ enable_desktop }}
      # - if: false
      - if: true
        then:
        # create desktop/dist # TODO verify
        # TODO install
        - pushd desktop
        # fix: Error failed to rename app binary $SRC_DIR/target/release/rqbit-desktop: No such file or directory (os error 2)
        # expected output: target/release/rqbit-desktop
        # actual output: target/x86_64-unknown-linux-gnu/release/rqbit-desktop
        # - |
        #   sed -i -E '/"mainBinaryName": "rqbit-desktop",/d' src-tauri/tauri.conf.json
        # - npm run build # this is run by "cargo tauri build --ci"
        # - cargo install tauri-cli
        # - curl -L --proto '=https' --tlsv1.2 -sSf https://raw.githubusercontent.com/cargo-bins/cargo-binstall/main/install-from-binstall-release.sh | bash
        # - cargo binstall tauri-cli --no-confirm
        # - cargo metadata --format-version=1 | jq '.target_directory'; exit 1 # debug
        # - cargo install tauri-cli
        # - cargo tauri build --ci
        # - cargo tauri build --ci -v
        # set target to fix: Error failed to rename app binary $SRC_DIR/target/release/rqbit-desktop: No such file or directory (os error 2)
        # expected output: target/release/rqbit-desktop
        # actual output: target/x86_64-unknown-linux-gnu/release/rqbit-desktop
        # - cargo tauri build --ci -v --target x86_64-unknown-linux-gnu
        # - cargo tauri build --ci -v --target $CARGO_BUILD_TARGET
        # no-bundle: dont build AppImage etc
        # build $SRC_DIR/target/x86_64-unknown-linux-gnu/release/rqbit-desktop
        # - cargo tauri build --ci -v --target $CARGO_BUILD_TARGET --no-bundle
        # - cargo tauri --help
        # no. "tauri bundle" can only create: deb, rpm, appimage
        # - cargo tauri bundle --help
        - if: unix
          then:
            - cargo auditable install --locked --no-track --bins --root ${{ PREFIX }} --path src-tauri
          else:
            - cargo auditable install --locked --no-track --bins --root %LIBRARY_PREFIX% --path src-tauri
        - popd

      # TODO remove?
      - pushd crates/librqbit/webui
      - npm prune --omit=dev
      - popd

      # TODO remove?
      - pushd desktop
      - npm prune --omit=dev
      - popd

      - cargo-bundle-licenses --format yaml --output THIRDPARTY.yml

      # TODO postInstall
      # for shell in bash fish zsh; do
      #   installShellCompletion --cmd rqbit --$shell <($out/bin/rqbit completions $shell)
      # done

requirements:
  build:
    - ${{ stdlib('c') }}
    - ${{ compiler('c') }}
    - ${{ compiler('rust') }}
    - cargo-bundle-licenses
    - cargo-auditable
    - nodejs
    - pkg-config

  # ⚠ warning Overdepending against libzlib
  # ⚠ warning Overdepending against libexpat
  host:
    - openssl ${{ openssl_version }}
    # fix: Package 'zlib', required by 'gio-2.0', not found
    - zlib
    - glib # glib gobject ...
    - gdk-pixbuf
    - gtk3 # gdk
    # fix: Package 'expat', required by 'fontconfig', not found
    - expat
    - libsoup
    - webkit2gtk4.1 # javascriptcoregtk-4.1

tests:
  - script:
    # - rqbit-desktop --version # FIXME this starts the GUI
    # check existence of $PREFIX/bin/rqbit-desktop
    - command -v rqbit-desktop

about:
  homepage: https://github.com/ikatson/rqbit
  license: Apache-2.0
  license_file: LICENSE
  summary: "A bittorrent client in Rust"

extra:
  recipe-maintainers:
    - milahu
